version: "2"

linters:
  enable:
    - bodyclose
    - canonicalheader
    - contextcheck
    - copyloopvar
    - errcheck
    - errorlint
    - exhaustive
    - fatcontext
    - goconst
    - gocritic
    - gosec
    - govet
    - importas
    - ineffassign
    - misspell
    - nilerr
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
